<div class="auth-page page-enter">
  <div class="auth-card card">
    <div class="auth-header">
      <a routerLink="/" class="auth-logo">
        <span class="logo-icon-sm">▶</span>
        <span>NEW<span class="text-accent">TUBE</span></span>
      </a>
      <h2>Welcome Back</h2>
      <p class="text-secondary">Sign in to continue exploring</p>
    </div>

    <div *ngIf="error" class="error-banner">
      {{ error }}
    </div>

    <form (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-input"
          [class.error]="email.invalid && email.touched"
          placeholder="you@example.com"
          [formControl]="$any(email)"
          autocomplete="email"
        />
        <span *ngIf="email.invalid && email.touched" class="form-error">
          Enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-input"
          [class.error]="password.invalid && password.touched"
          placeholder="••••••••"
          [formControl]="$any(password)"
          autocomplete="current-password"
        />
        <span *ngIf="password.invalid && password.touched" class="form-error">
          Password is required
        </span>
      </div>

      <button type="submit" class="btn btn-primary btn-lg auth-submit" [disabled]="loading">
        <span *ngIf="!loading">Sign In →</span>
        <span *ngIf="loading" class="loading-text">Signing in...</span>
      </button>
    </form>

    <p class="auth-footer text-secondary">
      No account yet?
      <a routerLink="/register" class="auth-link">Join free</a>
    </p>
  </div>
</div>
